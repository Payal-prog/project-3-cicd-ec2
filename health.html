<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Check</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #ffffff;
    }

    .container {
      text-align: center;
      padding: 40px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      opacity: 0;
      transform: scale(0.95);
      animation: fadeIn 0.8s ease-out forwards;
    }

    .status {
      font-size: 28px;
      font-weight: bold;
      color: #00ff9d;
      animation: pulse 2s infinite;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 16px;
      color: #d1d1d1;
    }

    .meta {
      margin-top: 20px;
      font-size: 15px;
      line-height: 1.7;
      color: #ffffff;
    }

    .highlight {
      color: #00ff9d;
      font-weight: bold;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.6; }
      100% { opacity: 1; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="status">✔ HEALTH CHECK: OK</div>
    <div class="subtitle">Application is running and reachable</div>

    <div class="meta">
      <div>EC2 Instance ID: <span class="highlight">__INSTANCE_ID__</span></div>
      <div>Private IP: <span class="highlight">__PRIVATE_IP__</span></div>
      <div>Availability Zone: <span class="highlight">__AZ__</span></div>
    </div>
  </div>
</body>
</html>
