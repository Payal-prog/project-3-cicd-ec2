name: CI/CD Docker Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/project-3-cicd-web .

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/project-3-cicd-web

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop project-3-web || true
            docker rm project-3-web || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/project-3-cicd-web
            docker run -d -p 80:80 --name project-3-web ${{ secrets.DOCKER_USERNAME }}/project-3-cicd-web